# Production-style compose: pulls the pre-built image from Docker Hub
# instead of building locally. Use this on the deployment host.
#
# Usage:
#   cp .env.prod.example .env
#   # fill BETTER_AUTH_SECRET, BETTER_AUTH_URL, ADMIN_*, POSTGRES_PASSWORD
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Differences from docker-compose.yml (dev):
# - `image:` instead of `build:` — no local source needed on the host.
# - The image is **pinned to a version tag**, not `:latest`. Bump
#   IMAGE_TAG in .env when rolling out a new build.
# - Postgres port is NOT published to the host. Only the web container can
#   reach it via the compose-internal network.
# - Web port mapping defaults to 3000 but is configurable via WEB_PORT.

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dictaphone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dictaphone}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-dictaphone} -d ${POSTGRES_DB:-dictaphone}
      interval: 10s
      timeout: 3s
      retries: 10
    # No `ports:` — Postgres is reachable only from the web container.

  web:
    image: teslicvukasin/stt-dictaphone:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dictaphone}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-dictaphone}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL must be set in .env (e.g. https://dictaphone.yourdomain.com)}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set in .env (first boot only)}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env (first boot only)}
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres-data:
